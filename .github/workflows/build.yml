name: Build Llama.cpp CUDA 12.4 (Minimal Network Install)

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: 'Target llama.cpp version'
        required: true
        default: 'master'

jobs:
  build-windows-cuda:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ggml-org/llama.cpp
        ref: ${{ github.event.inputs.llama_version }}

    # 1. 核心修复：使用 30MB 官方网络精简安装包，在云端只流式抽取百兆核心，完美防爆盘、防 404
    - name: Install CUDA 12.4.1 (Network)
      run: |
        Invoke-WebRequest -Uri "https://developer.download.nvidia.com/compute/cuda/12.4.1/network_installers/cuda_12.4.1_windows_network.exe" -OutFile "cuda_network_installer.exe"
        Start-Process -FilePath ".\cuda_network_installer.exe" -ArgumentList "-s nvcc_12.4 runtime_12.4 cublas_12.4 cublas_dev_12.4" -Wait
        # 强行刷新当前执行环境的 Path 路径，确保下一步的 cmake 能够直接感知 nvcc
        $CUDA_BIN = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\bin"
        $env:PATH = "$CUDA_BIN;$env:PATH"
        echo "$CUDA_BIN" >> $env:GITHUB_PATH

    # 2. 灵魂进化：精准注入 -DGGML_CUDA_FA_ALL_QUANTS=ON，彻底释放非对称 KV 缓存的显存压缩神技
    - name: Build with CMake
      run: |
        $CUDA_ROOT = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4"
        $env:PATH = "$CUDA_ROOT\bin;$env:PATH"
        
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DGGML_CUDA=ON `
          -DGGML_CUDA_FA_ALL_QUANTS=ON `
          -DCMAKE_BUILD_TYPE=Release `
          -DCUDAToolkit_ROOT="$CUDA_ROOT" `
          -DCMAKE_CUDA_COMPILER="$CUDA_ROOT\bin\nvcc.exe"
          
        cmake --build build --config Release

    # 3. 全打包输出：一网打尽所有主程序和子文件夹下的动态链接库（如关键的 ggml-cuda.dll）
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: llama-cpp-cuda12-all-programs-${{ github.event.inputs.llama_version }}
        path: build/bin/Release/
