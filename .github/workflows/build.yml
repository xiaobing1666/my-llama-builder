name: Build Llama.cpp CUDA 12.4 (Official Production Linux Standard)

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: 'Target llama.cpp version (e.g., master or tag)'
        required: true
        default: 'master'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  GGML_NLOOP: 3
  GGML_N_THREADS: 1
  LLAMA_ARG_LOG_COLORS: 1
  LLAMA_ARG_LOG_PREFIX: 1
  LLAMA_ARG_LOG_TIMESTAMPS: 1

jobs:
  cuda-production-build:
    runs-on: ubuntu-24.04
    container: nvidia/cuda:12.6.2-devel-ubuntu24.04

    steps:
    - name: Clone Code
      uses: actions/checkout@v4
      with:
        repository: ggml-org/llama.cpp
        ref: ${{ github.event.inputs.llama_version }}
        fetch-depth: 0

    - name: Install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt update
        apt install -y cmake build-essential ninja-build libgomp1 git libssl-dev

    - name: ccache
      uses: ggml-org/ccache-action@v1.2.21
      with:
        key: cuda-ubuntu-24.04-cuda
        evict-old-files: 1d
        save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

    - name: Build with CMake
      run: |
        cmake -S . -B build -G Ninja \
          -DLLAMA_FATAL_WARNINGS=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CUDA_ARCHITECTURES=89-real \
          -DCMAKE_EXE_LINKER_FLAGS=-Wl,--allow-shlib-undefined \
          -DLLAMA_BUILD_TESTS=OFF \
          -DGGML_NATIVE=OFF \
          -DGGML_CUDA=ON \
          -DGGML_CUDA_CUB_3DOT2=ON \
          -DGGML_CUDA_FA_ALL_QUANTS=ON
        cmake --build build
        cmake --install build --prefix build/dist

    - name: Upload Production Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: llama-cpp-linux-cuda12-${{ github.event.inputs.llama_version }}
        path: build/dist/
