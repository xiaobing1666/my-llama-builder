name: Build All Llama.cpp Programs CUDA 12.4 (Official Standard)

on:
  workflow_dispatch:
    inputs:
      llama_version:
        description: '请输入你要编译的 llama.cpp 版本 (例如 master, b4700, 或具体的 Commit Hash)'
        required: true
        default: 'master'

jobs:
  build-windows-cuda:
    runs-on: windows-2022
    
    steps:
    - name: Clone Llama.cpp (Custom Version)
      run: |
        git clone https://github.com/ggml-org/llama.cpp.git
        cd llama.cpp
        $TARGET_VERSION = "${{ github.event.inputs.llama_version }}"
        echo "正在切换至目标版本: $TARGET_VERSION"
        git checkout $TARGET_VERSION

    - name: Configure CUDA Environment
      run: |
        # 探测当前 windows-2022 镜像中预装的 CUDA 12 路径并建立全局安全映射
        if (Test-Path "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA") {
            $cuda_dir = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA" | Select-Object -First 1
            if ($cuda_dir) {
                $env:CUDA_PATH = $cuda_dir.FullName
                echo "探测到预装的 CUDA 路径: $env:CUDA_PATH"
                # 写入 GitHub Actions 跨步骤全局变量管道
                echo "CUDA_PATH=$env:CUDA_PATH" >> $env:GITHUB_ENV
                echo "$env:CUDA_PATH\bin" >> $env:GITHUB_PATH
            }
        }

    - name: Setup MSBuild and MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Configure CMake with ALL_QUANTS
      run: |
        cd llama.cpp
        
        # 强行锁定并提取当前步骤的 CUDA 绝对路径，彻底粉碎 "Could not find nvcc" 报错
        $CUDA_VERSION_DIR = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4"
        if (-not (Test-Path $CUDA_VERSION_DIR)) {
            $found_dir = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA" | Select-Object -First 1
            if ($found_dir) { $CUDA_VERSION_DIR = $found_dir.FullName }
        }
        
        $env:PATH = "$CUDA_VERSION_DIR\bin;$env:PATH"
        $env:CUDA_PATH = $CUDA_VERSION_DIR
        
        # 显式使用 -DCUDAToolkit_ROOT 和 -DCMAKE_CUDA_COMPILER 将 nvcc 强行喂给 CMake 编译器
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DGGML_CUDA=ON `
          -DGGML_CUDA_FA_ALL_QUANTS=ON `
          -DCMAKE_BUILD_TYPE=Release `
          -DCUDAToolkit_ROOT="$CUDA_VERSION_DIR" `
          -DCMAKE_CUDA_COMPILER="$CUDA_VERSION_DIR\bin\nvcc.exe"

    - name: Build All Programs
      run: |
        cd llama.cpp
        # 构建整个项目的所有免限制可执行程序
        cmake --build build --config Release

    - name: Upload Custom Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: llama-cpp-cuda12-all-programs-${{ github.event.inputs.llama_version }}
        path: |
          # 核心改动：直接指定打包整个 Release 文件夹。
          # 这样能一网打尽所有主程序、子目录下的动态库组件，且绝不会因为单文件不匹配而报错！
          llama.cpp/build/bin/Release/
